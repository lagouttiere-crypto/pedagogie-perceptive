<script>
document.addEventListener('DOMContentLoaded', function() {
  const marked = document.querySelectorAll('.mark-concept, .mark-link');
  
  marked.forEach(function(mark) {
    const margin = mark.closest('p').nextElementSibling;
    if (!margin || !margin.classList.contains('column-margin')) return;
    
    mark.addEventListener('mouseenter', function() {
      margin.style.opacity = '1';
    });
    
    mark.addEventListener('mouseleave', function() {
      margin.style.opacity = '0.35';
    });
    
    margin.addEventListener('mouseenter', function() {
      margin.style.opacity = '1';
      mark.style.background = mark.classList.contains('mark-concept') 
        ? 'rgb(80 57 150 / 40%)' 
        : 'rgba(80, 160, 120, 0.4)';
    });
    
    margin.addEventListener('mouseleave', function() {
      margin.style.opacity = '0.35';
      mark.style.background = mark.classList.contains('mark-concept')
        ? 'rgb(80 57 150 / 21%)'
        : 'rgba(80, 160, 120, 0.2)';
    });
  });
});
</script>

<style>
.margin-tooltip {
  position: relative;
  display: inline-block;
}

.margin-tooltip .tooltip-text {
  visibility: hidden;
  opacity: 0;
  width: 220px;
  background: #182058;
  color: #eef2ff;
  font-size: 11px;
  line-height: 1.5;
  padding: 10px 12px;
  border-radius: 4px;
  position: absolute;
  right: 105%;
  top: 0;
  transition: opacity 0.3s ease;
  font-style: italic;
}

.margin-tooltip:hover .tooltip-text {
  visibility: visible;
  opacity: 1;
}
</style>
